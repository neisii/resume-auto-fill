# Field alias dictionary
# Format: profile_field_key: [list of template label variants]
# profile_field_key uses dotted-path notation matching the flattened profile structure
#
# 공백은 매칭 전 자동으로 제거됩니다 (FieldMatcher._normalize).
# 공백만 다른 변형은 별도로 등록하지 않아도 됩니다.

# 매칭에서 완전히 제외할 라벨 목록 (오매핑 방지)
_exclude:
  - 지원일자       # resume_sample-8: basic.name에 85%로 오매핑
  - 상세경력사항    # resume_sample-8: basic.career_year에 80%로 오매핑

# 예시 값으로 채워진 셀을 덮어쓸 텍스트 목록 (내장 패턴으로 처리 불가한 것만 추가)
# 내장 패턴: yyyy.mm / 0000.00 형식, xxxx 형식, 입력/기재/작성/예) 포함 문구
_overwrite: []

# ── basic ─────────────────────────────────────────────────────────────────────

basic.name:
